<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweety 即時翻譯</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <!-- 頂部標題列 -->
        <header class="topbar">
            <h1>Sweety 即時翻譯</h1>
        </header>

        <!-- 主內容區 -->
        <main class="content">
            <!-- 語言選擇列 -->
            <div class="lang-bar">
                <select id="langA" class="lang-select">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
                
                <button id="swap" class="swap-btn">⇄</button>
                
                <select id="langB" class="lang-select">
                    <option value="en">English</option>
                    <option value="zh-TW">繁體中文</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
            </div>

            <!-- 翻譯結果框 -->
            <div class="result-box">
                <p id="result" class="placeholder">翻譯結果會顯示在這裡…</p>
                <button id="ttsBtn" class="tts-btn" style="display: none;">🔊 朗讀</button>
            </div>

            <!-- 麥克風按鈕 -->
            <button id="micBtn" class="mic-btn">
                <span class="mic-icon">🎤</span>
                <span class="mic-label">點一下開始說話</span>
            </button>

            <!-- 文字輸入框 -->
            <div class="text-input-area">
                <textarea id="inputText" 
                          class="text-input" 
                          placeholder="或直接輸入要翻譯的文字…" 
                          maxlength="500"></textarea>
                <div class="input-footer">
                    <span id="charCount" class="char-count">0/500</span>
                    <button id="send" class="translate-btn">翻譯 ➤</button>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
