<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweety 即時翻譯</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=7">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <!-- OpenCC：手機語音辨識常把國語轉成簡體，載入後把辨識結果轉回繁體 -->
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.js"></script>
</head>
<body>
    <div class="container">
        <!-- 頂部標題列 -->
        <header class="topbar">
            <button id="modeBtn" class="mode-btn" title="切換模式">👤 單人</button>
            <h1>Sweety 即時翻譯 <span id="statusDot" class="status-dot"></span></h1>
            <button id="s_currency" class="tool-btn" title="匯率">💱</button>
            <button id="settingsBtn" class="settings-btn" title="設定">⚙️</button>
        </header>

        <!-- 主內容區 -->
        <main class="content">
            <!-- 開單人模式區 -->
            <section id="singleView" class="view">
                <!-- 語言選擇列 -->
                <div class="lang-bar">
                    <select id="langA" class="lang-select">
                        <option value="zh-TW">繁體中文</option>
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                    
                    <button id="swap" class="swap-btn">⇄</button>
                    
                    <select id="langB" class="lang-select">
                        <option value="en">English</option>
                        <option value="zh-TW">繁體中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>

                <!-- 模式選擇列 -->
                <div class="engine-bar" style="margin-bottom: 15px; display: flex; justify-content: center; gap: 20px; font-weight: 700; color: var(--text-secondary);">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="engine" value="sentence" checked style="accent-color: var(--accent);"> 逐句翻譯
                    </label>
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 6px;">
                        <input type="radio" name="engine" value="live" style="accent-color: var(--accent);"> 即時模式
                    </label>
                </div>

                <!-- 翻譯結果框 -->
                <div class="result-box">
                    <p id="result" class="placeholder">翻譯結果會顯示在這裡…</p>
                    <button id="ttsBtn" class="tts-btn" style="display: none;">🔊 朗讀</button>
                </div>

                <!-- 麥克風按鈕 -->
                <button id="micBtn" class="mic-btn">
                    <span class="mic-icon">🎤</span>
                    <span class="mic-label">點一下開始說話</span>
                </button>

                <!-- 相機按鈕 -->
                <button id="s_camera" class="mic-btn" style="margin-top: 10px; background: linear-gradient(135deg, #00b4db, #0083b0);">
                    <span class="mic-icon">📷</span>
                    <span class="mic-label">拍照 / 上傳翻譯</span>
                </button>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

                <!-- 文字輸入框 -->
                <div class="text-input-area">
                    <textarea id="inputText" 
                              class="text-input" 
                              placeholder="或直接輸入要翻譯的文字…" 
                              maxlength="500"></textarea>
                    <div class="input-footer">
                        <span id="charCount" class="char-count">0/500</span>
                        <button id="send" class="translate-btn">翻譯 ➤</button>
                    </div>
                </div>
            </section>

            <!-- 面對面模式區 -->
            <section id="faceView" class="view hidden">
                <!-- 上半：翻轉 180°，給對面的人看 -->
                <div class="face-panel top" id="face_top">
                    <div class="face-inner">
                        <select class="lang-select" id="f_langTop"></select>
                        <div class="result-box face-result" id="f_resultTop">
                            <span class="placeholder">對方語言的翻譯會顯示在這裡…</span>
                        </div>
                        <button class="mic-btn face-mic" id="f_micTop"><span class="mic-ico">🎤</span> 說話</button>
                    </div>
                </div>

                <div class="face-divider"><span>面對面 · 手機平放桌上</span></div>

                <!-- 下半：正常方向，給你看 -->
                <div class="face-panel bottom" id="face_bottom">
                    <div class="face-inner">
                        <select class="lang-select" id="f_langBottom"></select>
                        <div class="result-box face-result" id="f_resultBottom">
                            <span class="placeholder">你的語言的翻譯會顯示在這裡…</span>
                        </div>
                        <button class="mic-btn face-mic" id="f_micBottom"><span class="mic-ico">🎤</span> 說話</button>
                    </div>
                </div>
            </section>
        </main>
    <!-- 設定彈窗 -->
    <div id="settingsModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>系統設定</h2>
            <div class="form-group">
                <label for="cfgGeminiKey">Gemini API 金鑰：</label>
                <input type="password" id="cfgGeminiKey" placeholder="請輸入 API 金鑰，留空則使用伺服器金鑰">
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none;">
                    <input type="checkbox" id="cfgAutoSpeak"> 翻譯後自動語音朗讀
                </label>
            </div>
            <div class="form-group">
                <label for="cfgRate">語音朗讀速度 (<span id="cfgRateVal">1.0</span>x)：</label>
                <input type="range" id="cfgRate" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
            <button id="saveSettings" class="save-btn">儲存設定</button>
        </div>
    </div>

    <!-- 拍照翻譯彈窗 -->
    <div id="visionModal" class="modal hidden">
        <div class="modal-content" style="max-width: 600px;">
            <span id="vision_close" class="close-btn">&times;</span>
            <h2 id="visionTitle">📷 拍照翻譯</h2>
            
            <div id="visionPreview" class="vision-preview hidden" style="text-align: center; margin: 15px 0;"></div>
            
            <p id="visionStatus" style="text-align: center; color: var(--text-secondary); margin: 10px 0; font-weight: bold;"></p>
            
            <div id="visionResult" class="hidden">
                <div class="form-group">
                    <label style="font-weight: bold;">內容摘要：</label>
                    <div id="visionSummary" class="result-box" style="min-height: 50px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; margin-top: 5px; white-space: pre-wrap; text-align: left;"></div>
                </div>
                <div class="form-group" style="margin-top: 15px;">
                    <label style="font-weight: bold;">翻譯結果：</label>
                    <div id="visionTranslation" class="result-box" style="min-height: 80px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 5px; margin-top: 5px; white-space: pre-wrap; text-align: left;"></div>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 15px; display: flex; align-items: center; gap: 10px; text-align: left;">
                <label for="vision_target" style="font-weight: bold;">翻譯目標語言：</label>
                <select id="vision_target" class="lang-select" style="flex: 1;">
                    <option value="zh-TW">繁體中文</option>
                    <option value="en">English</option>
                    <option value="ja">日本語</option>
                    <option value="ko">한국어</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="vision_speak" class="save-btn" style="flex: 1; background: var(--accent);">🔊 朗讀</button>
                <button id="vision_close_btn" class="save-btn" style="flex: 1; background: #555;">關閉</button>
            </div>
        </div>
    </div>

    <!-- 匯率換算彈窗 -->
    <div class="modal hidden" id="currencyModal">
        <div class="modal-content" style="max-width: 400px;">
            <span id="cur_close_x" class="close-btn">&times;</span>
            <h2>💱 匯率換算</h2>
            <div class="form-group">
                <label for="cur_amount" style="font-weight: bold;">輸入金額：</label>
                <input type="number" id="cur_amount" class="text-input" style="background: rgba(255,255,255,0.04); border: 1px solid rgba(212,175,55,0.25); border-radius: 10px; padding: 12px 14px;" value="1" min="0" step="any">
            </div>
            <div class="cur-row">
                <select id="cur_from" class="lang-select"></select>
                <button id="cur_swap" title="對調幣別">⇄</button>
                <select id="cur_to" class="lang-select"></select>
            </div>
            <div class="cur-result" id="cur_result">—</div>
            <div class="cur-rate" id="cur_rate"></div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button id="cur_convert" class="save-btn" style="flex: 1; margin-top: 0;">換算</button>
                <button id="cur_close" class="save-btn" style="flex: 1; margin-top: 0; background: #555;">關閉</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}?v=7"></script>
</body>
</html>
